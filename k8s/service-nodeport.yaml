# Temporary NodePort service to expose frontend for testing (t3.micro workaround)
# In production, use ALB Ingress instead
apiVersion: v1
kind: Service
metadata:
  name: frontend-nodeport
  namespace: devops
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
