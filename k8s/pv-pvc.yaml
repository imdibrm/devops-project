# Headless Service for potential Postgres StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: devops
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
---
# NOTE: PostgreSQL StatefulSet commented out due to t3.micro IP constraints
# Each pod consumes an elastic IP from AWS VPC CNI. t3.micro can only support ~8 total pods across all namespaces.
# With 6 system pods (aws-node, coredns, kube-proxy, metrics-server), only 2 slots remain.
# This leaves room for backend and frontend deployments only.
# For production: Deploy RDS database in private subnets instead.
# For testing: Backend uses in-memory storage or ConfigMap data.
